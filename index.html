<!DOCTYPE html>
<html>
<head>
    <title>Open Buildings Viewer</title>

    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        input[type="number"] {
            padding: 8px;
            margin: 5px;
            width: 180px;
        }

        input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }

        #map {
            height: 650px;
            width: 100%;
            margin-top: 20px;
        }
        .legend {
            background: white;
            padding: 10px;
            border-radius: 5px;
            line-height: 22px;
            box-shadow: 0 0 8px rgba(0,0,0,0.3);
        }

        .legend i {
            width: 18px;
            height: 18px;
            float: left;
            margin-right: 8px;

        }
        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .checkbox-label {
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
}
          
    </style>
</head>

<body>

    <h2>Open Buildings Viewer</h2>

    <div class="controls">
        <input type="number" id="lat" placeholder="Enter Latitude">
        <input type="number" id="lon" placeholder="Enter Longitude">
        <input type="number" id="radius" placeholder="Radius in meters">
        <input type="number" id="limit" placeholder="No. of buildings">
        <input type="number" id="gridSize" placeholder="Grid size (m)">
    
        <label class="checkbox-label">
            <input type="checkbox" id="showMap" checked>
            Render on Map
        </label>
    
        <button onclick="showLocation()">Show Location</button>
        <button onclick="showVisualization()">Generate Area Visualization</button>
        <button onclick="downloadGrid()">Download Grid GeoJSON</button>
    </div>
   
   


    <p id="status"></p>

    <div id="map"></div>

   
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-image/leaflet-image.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    

    <script>

        const BACKEND_URL = "https://open-building-backend.onrender.com";

        var map = L.map('map').setView([30.3165, 78.0322], 13);
    
        var satelliteLayer = L.tileLayer(
            "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
            {
                attribution: "Tiles © Esri",
                crossOrigin: true
            }
        ).addTo(map);

        var osmLayer = L.tileLayer(
            "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
            {
                 attribution: "© OpenStreetMap",
                 crossOrigin: true
            }
        );
        
        var marker;
        var box;
        var buildingLayer;
        var gridLayer;
        
        
        async function showLocation() {
    
            var lat = parseFloat(document.getElementById("lat").value);
            var lon = parseFloat(document.getElementById("lon").value);
            var radius = parseFloat(document.getElementById("radius").value);
            var limit = parseInt(document.getElementById("limit").value);
            var gridSize = parseInt(document.getElementById("gridSize").value);
            var showMap = document.getElementById("showMap").checked;
    
            if (
                isNaN(lat) ||
                isNaN(lon) ||
                isNaN(radius) ||
                isNaN(limit) ||
                isNaN(gridSize)
            ) {
                alert("Please fill all fields");
                return;
            }

            document.getElementById("status").innerText = "Loading buildings...";

            if (buildingLayer) {
                    map.removeLayer(buildingLayer);
            }


            try {
                const response = await fetch(`${BACKEND_URL}/buildings?lat=${lat}&lon=${lon}&radius=${radius}&limit=${limit}`);
                const data = await response.json();
                console.log(data);

                if (!showMap) {
                    var geojsonText = JSON.stringify(data, null, 2);

                    var blob = new Blob([geojsonText], {
                    type: "application/json"
                });

                var link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = "buildings.geojson";
                link.click();

                URL.revokeObjectURL(link.href);

                document.getElementById("status").innerText = "GeoJSON downloaded";
                return;
            }
                

                buildingLayer = L.geoJSON(data, {
                style: function () {
                    return {
                        color: "blue",
                        weight: 2,
                        fillColor: "blue",
                        fillOpacity: 0.35,
                        interactive: true
                     };
                },


            onEachFeature: function (feature, layer) {
                layer.on("click", function () {
                    alert(
                     "Area: " + feature.properties.area_m2 + " m²\n" +
                     "Perimeter: " + feature.properties.perimeter_m +"m\n" +
                     "Length: " + feature.properties.length_m +"m\n"+ 
                     "Width: " + feature.properties.width_m + " m\n" +
                     "Elongation: " + feature.properties.elongation + "\n" +
                     "Compactness: " + feature.properties.compactness + "\n" +
                     "Orientation: " + feature.properties.orientation + "°\n" +
                     "Equivalent Rectangular Index: " + feature.properties.equivalent_rectangular_index + "\n" +
                     "Squareness: " + feature.properties.squareness
                    );
                 });

                 layer.bindPopup(
                    "Area: " + feature.properties.area_m2 + " m²<br>" +
                    "Perimeter: " + feature.properties.perimeter_m + " m<br>" +
                    "Length: " + feature.properties.length_m + " m<br>" +
                    "Width: " + feature.properties.width_m + " m<br>" +
                    "Elongation: " + feature.properties.elongation + "<br>" +
                    "Compactness: " + feature.properties.compactness + "<br>" +
                    "Orientation: " + feature.properties.orientation + "°<br>" +
                    "Equivalent Rectangular Index: " + feature.properties.equivalent_rectangular_index + "<br>" +
                    "Squareness: " + feature.properties.squareness
                );
             }
            }).addTo(map);

            const gridResponse = await fetch(`${BACKEND_URL}/grids?lat=${lat}&lon=${lon}&radius=${radius}&grid_size=${gridSize}`);

            const gridData = await gridResponse.json();

            if (gridLayer) {

                map.removeLayer(gridLayer);

            }

            gridLayer = L.geoJSON(gridData, {
                    style: function () {
                        return {
                            color: "yellow",
                            weight: 1,
                            fillOpacity: 0,
                            opacity: 0.6,
                            interactive: false
                        };

                    }
            }).addTo(map);

            buildingLayer.bringToFront();

                document.getElementById("status").innerText = "Buildings loaded";
            } 
            catch (err) {
                alert("ERROR: " + err);
            }
    
            map.setView([lat, lon], 15);
    
            if (marker) {
                map.removeLayer(marker);
            }
    
            marker = L.marker([lat, lon]).addTo(map);
    
            var radiusMeters = parseFloat(radius);

            var latOffset = radiusMeters / 111320;
            var lonOffset = radiusMeters / (111320 * Math.cos(lat * Math.PI / 180));

            var bounds = [
                [lat - latOffset, lon - lonOffset],
                [lat + latOffset, lon + lonOffset]
            ];
    
            if (box) {
                map.removeLayer(box);
            }
    
            box = L.rectangle(bounds, {
                 color: "red",
                 weight: 2,
                 fillOpacity: 0.1,
                 interactive: false
                }).addTo(map);
        }

         function getBuildingColor(area) {
                if (area > 300) return "#800026";
                if (area > 150) return "#BD0026";
                if (area > 50) return "#FD8D3C";
                return "#FED976";
            }

            var legend;

        function addLegend() {
            if (legend) {
                 map.removeControl(legend);
            }

            legend = L.control({ position: "bottomleft" });

            legend.onAdd = function() {
                var div = L.DomUtil.create("div", "legend");

                div.innerHTML += "<b>Building Area</b><br>";
                div.innerHTML += '<i style="background:#FED976"></i> 0 - 50 m²<br>';
                div.innerHTML += '<i style="background:#FD8D3C"></i> 50 - 150 m²<br>';
                div.innerHTML += '<i style="background:#BD0026"></i> 150 - 300 m²<br>';
                div.innerHTML += '<i style="background:#800026"></i> 300+ m²<br>';

                return div;
            };

            legend.addTo(map);  
        
        }
            
        
        
        function showVisualization() {
              
            if (!buildingLayer) {
                alert("Please click Show Location first.");
                return;
             }

            buildingLayer.eachLayer(function(layer) {
                
                var area = layer.feature.properties.area_m2;

                layer.setStyle({
                    color: getBuildingColor(area),
                    fillColor: getBuildingColor(area),
                    weight: 1,
                    fillOpacity: 0.8
                    });
                });
                addLegend();
            }

            async function downloadGrid() {
                var lat = parseFloat(document.getElementById("lat").value);
                var lon = parseFloat(document.getElementById("lon").value);
                var radius = parseFloat(document.getElementById("radius").value);
                var gridSize = parseInt(document.getElementById("gridSize").value);

            try {

                const response = await fetch(`${BACKEND_URL}/grids?lat=${lat}&lon=${lon}&radius=${radius}&grid_size=${gridSize}`);

                const data = await response.json();

                const geojsonText = JSON.stringify(data, null, 2);

                const blob = new Blob(
                    [geojsonText],
                    { type: "application/json" }
                );

                const link = document.createElement("a");

                link.href = URL.createObjectURL(blob);
                link.download = "grids.geojson";

                link.click();

                URL.revokeObjectURL(link.href);

            }
            catch (err) {

                alert("Grid download failed: " + err);

                }   
            }
    </script>

</body>
</html>
